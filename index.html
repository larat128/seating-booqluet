<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Don Bosco Theatre Seating</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        /* Optional: Soft rounded corners for everything */
        .rounded-custom { border-radius: 1.5rem; }
    </style>
</head>
<body class="bg-pink-50 text-slate-700 min-h-screen flex flex-col items-center p-6 font-sans">

    <h1 class="text-3xl font-bold mb-2 text-purple-400">🎭 Don Bosco Theatre</h1>
    <p id="availability-status" class="mb-6 font-medium text-teal-500">Checking availability...</p>

    <div id="seat-grid" class="grid gap-2 mb-6"></div>

    <div id="booking-panel" class="bg-white p-6 rounded-custom shadow-lg w-80 text-center border border-pink-100">
        <div id="active-booking">
            <p class="mb-2 text-slate-500">Selected Seat: <span id="selectedSeatLabel" class="text-purple-400 font-bold text-lg">None</span></p>

            <select id="ticketType" class="bg-yellow-50 text-slate-600 border border-yellow-200 p-2 rounded-lg w-full mb-4 outline-none focus:ring-2 focus:ring-purple-300">
                <option value="">Select Ticket Type</option>
                <option value="adult">Adult ($10)</option>
                <option value="minor">Minor ($5)</option>
            </select>

            <p class="mb-4 text-xl font-semibold">Total: <span class="text-teal-400">$</span><span id="priceDisplay" class="text-teal-400">0</span></p>

            <button id="confirmBtn" class="bg-teal-300 hover:bg-teal-400 transition-colors text-white font-bold px-4 py-3 rounded-xl w-full shadow-md">
                Confirm Booking
            </button>
        </div>

        <div id="sold-out-message" class="hidden">
            <h2 class="text-pink-400 text-2xl font-bold mb-2">SOLD OUT</h2>
            <p class="text-slate-400 text-sm">There is no more availability. Please wait for the next function.</p>
        </div>
    </div>

    <button id="resetBtn" class="mt-12 text-slate-400 text-xs hover:text-pink-400 transition-colors">
        Admin: Reset for Next Function
    </button>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getFirestore, doc, setDoc, deleteDoc, onSnapshot, collection, getDocs, writeBatch } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyAYFZz6yojkPAWWFU2gWxrbsFvlwbyanb0",
            authDomain: "don-bosco-seating-booqluet.firebaseapp.com",
            projectId: "don-bosco-seating-booqluet",
            storageBucket: "don-bosco-seating-booqluet.firebasestorage.app",
            messagingSenderId: "1005727362551",
            appId: "1:1005727362551:web:205c7b9f419255267cd2f2"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        // --- THEATRE CONFIG ---
        const rows = ["A", "B", "C", "D", "E"];
        const seatsPerRow = 8;
        const totalSeatsCount = rows.length * seatsPerRow;
        const prices = { adult: 10, minor: 5 };
        
        let selectedSeat = null;
        let dbSeats = {};

        // DOM Elements
        const grid = document.getElementById("seat-grid");
        const seatLabel = document.getElementById("selectedSeatLabel");
        const ticketTypeSelect = document.getElementById("ticketType");
        const priceDisplay = document.getElementById("priceDisplay");
        const confirmBtn = document.getElementById("confirmBtn");
        const statusText = document.getElementById("availability-status");
        const bookingUI = document.getElementById("active-booking");
        const soldOutUI = document.getElementById("sold-out-message");
        const resetBtn = document.getElementById("resetBtn");

        grid.style.gridTemplateColumns = `repeat(${seatsPerRow}, 1fr)`;

        // --- REAL-TIME LISTENERS ---
        onSnapshot(collection(db, "seats"), (snapshot) => {
            dbSeats = {};
            snapshot.forEach(doc => {
                dbSeats[doc.id] = doc.data();
            });
            
            const occupiedCount = Object.keys(dbSeats).length;
            updateAvailability(occupiedCount);
            renderGrid();
        });

        function updateAvailability(count) {
            if (count >= totalSeatsCount) {
                statusText.innerText = "❌ No Availability Left";
                statusText.classList.replace("text-teal-500", "text-pink-400");
                bookingUI.classList.add("hidden");
                soldOutUI.classList.remove("hidden");
            } else {
                const remaining = totalSeatsCount - count;
                statusText.innerText = `✅ ${remaining} Seats Available`;
                statusText.classList.replace("text-pink-400", "text-teal-500");
                bookingUI.classList.remove("hidden");
                soldOutUI.classList.add("hidden");
            }
        }

        function renderGrid() {
            grid.innerHTML = "";
            rows.forEach(row => {
                for (let i = 1; i <= seatsPerRow; i++) {
                    const id = row + i;
                    const isOccupied = dbSeats[id]?.status === "occupied";
                    const isSelected = selectedSeat === id;

                    const btn = document.createElement("button");
                    btn.innerText = id;
                    
                    let baseClass = "p-3 w-10 h-10 text-xs font-bold rounded-lg transition-all ";
                    if (isOccupied) {
                        btn.className = baseClass + "bg-pink-300 text-white cursor-not-allowed opacity-70";
                        btn.disabled = true;
                    } else if (isSelected) {
                        btn.className = baseClass + "bg-purple-400 text-white ring-2 ring-purple-200 scale-110";
                    } else {
                        btn.className = baseClass + "bg-yellow-200 text-slate-600 hover:bg-yellow-300";
                    }

                    btn.onclick = () => selectSeat(id);
                    grid.appendChild(btn);
                }
            });
        }

        function selectSeat(id) {
            selectedSeat = id;
            seatLabel.innerText = id;
            renderGrid();
        }

        ticketTypeSelect.addEventListener("change", () => {
            priceDisplay.innerText = prices[ticketTypeSelect.value] || 0;
        });

        // --- CONFIRM BOOKING ---
        confirmBtn.onclick = async () => {
            if (!selectedSeat || !ticketTypeSelect.value) {
                alert("Please select a seat and ticket type!");
                return;
            }

            try {
                confirmBtn.disabled = true;
                await setDoc(doc(db, "seats", selectedSeat), {
                    status: "occupied",
                    type: ticketTypeSelect.value,
                    price: prices[ticketTypeSelect.value]
                });
                
                selectedSeat = null;
                seatLabel.innerText = "None";
                ticketTypeSelect.value = "";
                priceDisplay.innerText = "0";
            } catch (e) {
                alert("Error: " + e.message);
            } finally {
                confirmBtn.disabled = false;
            }
        };

        // --- RESET FOR NEXT FUNCTION ---
        resetBtn.onclick = async () => {
            if (confirm("Clear all bookings and start the next function?")) {
                const querySnapshot = await getDocs(collection(db, "seats"));
                const batch = writeBatch(db);
                querySnapshot.forEach((doc) => {
                    batch.delete(doc.ref);
                });
                await batch.commit();
                alert("Theatre reset! Everyone's page will update automatically.");
            }
        };
    </script>
</body>
</html>
