<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Don Bosco Theatre Seating</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-slate-900 text-white min-h-screen flex flex-col items-center p-6">

    <h1 class="text-3xl font-bold mb-6">🎭 Don Bosco Theatre Seating</h1>

    <div id="seat-grid" class="grid gap-2 mb-6"></div>

    <div class="bg-slate-800 p-6 rounded-xl shadow-xl w-80 text-center border border-slate-700">
        <p class="mb-2 text-slate-400">Selected Seat: <span id="selectedSeatLabel" class="text-white font-bold text-lg">None</span></p>

        <select id="ticketType" class="bg-slate-700 text-white border border-slate-600 p-2 rounded w-full mb-4 outline-none focus:ring-2 focus:ring-blue-500">
            <option value="">Select Ticket Type</option>
            <option value="adult">Adult ($10)</option>
            <option value="minor">Minor ($5)</option>
        </select>

        <p class="mb-4 text-xl font-semibold">Total: <span class="text-green-400">$</span><span id="priceDisplay" class="text-green-400">0</span></p>

        <button id="confirmBtn" class="bg-blue-600 hover:bg-blue-500 transition-colors text-white font-bold px-4 py-3 rounded-lg w-full shadow-lg">
            Confirm Booking
        </button>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getFirestore, doc, setDoc, onSnapshot, collection } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

        // --- FIREBASE CONFIG ---
        const firebaseConfig = {
            apiKey: "AIzaSyAYFZz6yojkPAWWFU2gWxrbsFvlwbyanb0",
            authDomain: "don-bosco-seating-booqluet.firebaseapp.com",
            projectId: "don-bosco-seating-booqluet",
            storageBucket: "don-bosco-seating-booqluet.firebasestorage.app",
            messagingSenderId: "1005727362551",
            appId: "1:1005727362551:web:205c7b9f419255267cd2f2"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        // --- APP STATE ---
        const rows = ["A", "B", "C", "D", "E"];
        const seatsPerRow = 8;
        const prices = { adult: 10, minor: 5 };
        
        let selectedSeat = null;
        let dbSeats = {};

        // DOM Elements
        const grid = document.getElementById("seat-grid");
        const seatLabel = document.getElementById("selectedSeatLabel");
        const ticketTypeSelect = document.getElementById("ticketType");
        const priceDisplay = document.getElementById("priceDisplay");
        const confirmBtn = document.getElementById("confirmBtn");

        // Setup Grid Columns
        grid.style.gridTemplateColumns = `repeat(${seatsPerRow}, 1fr)`;

        // --- REAL-TIME DATA ---
        onSnapshot(collection(db, "seats"), (snapshot) => {
            dbSeats = {};
            snapshot.forEach(doc => {
                dbSeats[doc.id] = doc.data();
            });
            renderGrid();
        });

        function renderGrid() {
            grid.innerHTML = "";
            rows.forEach(row => {
                for (let i = 1; i <= seatsPerRow; i++) {
                    const id = row + i;
                    const isOccupied = dbSeats[id]?.status === "occupied";
                    const isSelected = selectedSeat === id;

                    const btn = document.createElement("button");
                    btn.innerText = id;
                    
                    // Dynamic styling
                    let baseClass = "p-3 w-10 h-10 text-xs font-bold rounded transition-all ";
                    if (isOccupied) {
                        btn.className = baseClass + "bg-red-600 cursor-not-allowed opacity-80";
                        btn.disabled = true;
                    } else if (isSelected) {
                        btn.className = baseClass + "bg-blue-500 ring-2 ring-white scale-110";
                    } else {
                        btn.className = baseClass + "bg-slate-600 hover:bg-slate-500";
                    }

                    btn.onclick = () => selectSeat(id);
                    grid.appendChild(btn);
                }
            });
        }

        function selectSeat(id) {
            selectedSeat = id;
            seatLabel.innerText = id;
            renderGrid();
        }

        // --- UI LOGIC ---
        ticketTypeSelect.addEventListener("change", () => {
            const price = prices[ticketTypeSelect.value] || 0;
            priceDisplay.innerText = price;
        });

        confirmBtn.onclick = async () => {
            const type = ticketTypeSelect.value;
            
            if (!selectedSeat) {
                alert("Please select a seat first!");
                return;
            }
            if (!type) {
                alert("Please select a ticket type!");
                return;
            }

            try {
                confirmBtn.disabled = true;
                confirmBtn.innerText = "Processing...";

                // Save to Firestore
                await setDoc(doc(db, "seats", selectedSeat), {
                    status: "occupied",
                    type: type,
                    price: prices[type],
                    timestamp: new Date()
                });

                alert(`Seat ${selectedSeat} booked successfully!`);
                
                // Reset Selection
                selectedSeat = null;
                seatLabel.innerText = "None";
                ticketTypeSelect.value = "";
                priceDisplay.innerText = "0";
                
            } catch (error) {
                console.error("Error booking seat: ", error);
                alert("Booking failed. Check console.");
            } finally {
                confirmBtn.disabled = false;
                confirmBtn.innerText = "Confirm Booking";
            }
        };
    </script>
</body>
</html>
