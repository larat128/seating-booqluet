<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Don Bosco Theatre Seating</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="bg-slate-900 text-white p-6">

<h1 class="text-3xl font-bold text-center mb-6">Don Bosco Theatre</h1>

<div id="seat-grid" class="grid grid-cols-8 gap-2 max-w-md mx-auto"></div>

<button onclick="saveBooking()" class="mt-6 bg-blue-600 px-4 py-2 rounded">
    Confirm
</button>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
import { getFirestore, doc, setDoc, onSnapshot, collection } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

const firebaseConfig = {
    apiKey: "AIzaSyAYFZz6yojkPAWWFU2gWxrbsFvlwbyanb0",
    authDomain: "don-bosco-seating-booqluet.firebaseapp.com",
    projectId: "don-bosco-seating-booqluet",
    storageBucket: "don-bosco-seating-booqluet.firebasestorage.app",
    messagingSenderId: "1005727362551",
    appId: "1:1005727362551:web:205c7b9f419255267cd2f2"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

let selectedSeats = [];
let dbSeats = {};

onSnapshot(collection(db, "seats"), (snapshot) => {
    dbSeats = {};
    snapshot.forEach(doc => {
        dbSeats[doc.id] = doc.data();
    });
    renderGrid();
});

function renderGrid() {
    const grid = document.getElementById("seat-grid");
    grid.innerHTML = "";

    for (let i = 1; i <= 40; i++) {
        const id = "S" + i;
        const occupied = dbSeats[id]?.status === "occupied";

        const btn = document.createElement("button");
        btn.innerText = id;
        btn.className = occupied ? "bg-red-500 p-2" : "bg-green-500 p-2";
        btn.disabled = occupied;

        btn.onclick = () => toggleSeat(id);

        grid.appendChild(btn);
    }
}

window.toggleSeat = (id) => {
    if (selectedSeats.includes(id)) {
        selectedSeats = selectedSeats.filter(s => s !== id);
    } else {
        selectedSeats.push(id);
    }
};

window.saveBooking = async () => {
    for (const id of selectedSeats) {
        await setDoc(doc(db, "seats", id), {
            status: "occupied"
        });
    }
    alert("Saved!");
};
</script>

</body>
</html>
