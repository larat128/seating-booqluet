<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Don Bosco Theatre Seating</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100 min-h-screen flex flex-col items-center p-6">

  <h1 class="text-3xl font-bold mb-6">🎭 Don Bosco Theatre Seating</h1>

  <!-- Seat Map -->
  <div id="seatMap" class="grid gap-2"></div>

  <!-- Info Panel -->
  <div class="mt-6 bg-white p-4 rounded shadow w-80 text-center">
    <p class="mb-2">Selected Seat: <span id="selectedSeat">None</span></p>

    <select id="ticketType" class="border p-2 rounded w-full mb-3">
      <option value="">Select Ticket Type</option>
      <option value="adult">Adult</option>
      <option value="minor">Minor</option>
    </select>

    <p class="mb-2">Price: $<span id="price">0</span></p>

    <button id="confirmBtn" class="bg-blue-500 text-white px-4 py-2 rounded w-full">
      Confirm Booking
    </button>
  </div>

  <script>
    // --- CONFIG ---
    const rows = ["A", "B", "C", "D", "E", "F"];
    const seatsPerRow = 10;

    const prices = {
      adult: 10,
      minor: 5
    };

    // Mock booked seats (simulate database)
    const bookedSeats = ["A3", "B5", "C7"];

    let selectedSeat = null;

    const seatMap = document.getElementById("seatMap");
    const selectedSeatText = document.getElementById("selectedSeat");
    const ticketType = document.getElementById("ticketType");
    const priceText = document.getElementById("price");

    // Create grid layout
    seatMap.style.gridTemplateColumns = `repeat(${seatsPerRow}, 1fr)`;

    // --- GENERATE SEATS ---
    rows.forEach(row => {
      for (let i = 1; i <= seatsPerRow; i++) {
        const seatId = row + i;

        const seat = document.createElement("div");
        seat.innerText = seatId;
        seat.className = "p-3 text-center rounded cursor-pointer text-white";

        // Set initial color
        if (bookedSeats.includes(seatId)) {
          seat.classList.add("bg-red-500", "cursor-not-allowed");
        } else {
          seat.classList.add("bg-gray-400");
        }

        // Click event
        seat.addEventListener("click", () => {
          if (bookedSeats.includes(seatId)) {
            console.log("Seat already booked:", seatId);
            return;
          }

          // Remove previous selection
          document.querySelectorAll(".bg-green-500").forEach(el => {
            el.classList.remove("bg-green-500");
            el.classList.add("bg-gray-400");
          });

          // Select new seat
          seat.classList.remove("bg-gray-400");
          seat.classList.add("bg-green-500");

          selectedSeat = seatId;
          selectedSeatText.innerText = seatId;

          console.log("Selected seat:", seatId);
        });

        seatMap.appendChild(seat);
      }
    });

    // --- PRICE CALCULATION ---
    ticketType.addEventListener("change", () => {
      const type = ticketType.value;
      const price = prices[type] || 0;
      priceText.innerText = price;

      console.log("Ticket type selected:", type, "Price:", price);
    });

    // --- CONFIRM BUTTON ---
    document.getElementById("confirmBtn").addEventListener("click", () => {
      if (!selectedSeat || !ticketType.value) {
        alert("Please select a seat and ticket type.");
        return;
      }

      const bookingData = {
        seat: selectedSeat,
        type: ticketType.value,
        price: prices[ticketType.value]
      };

      console.log("Booking data (send to DB later):", bookingData);

      alert("Booking simulated! Check console.");
    });
  </script>

</body>
</html>
